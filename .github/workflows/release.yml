name: Build Chrome Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install crx3
        run: npm install -g crx3

      - name: Write PEM file
        run: |
          echo "${{ secrets.EXTENSION_PEM }}" > ../extension.pem

      - name: Pack extension
        run: crx3 -p ../extension.pem -o ../extension.crx .

      - name: Clean up PEM
        run: rm ../extension.pem

      - name: Upload CRX as artifact
        uses: actions/upload-artifact@v6
        with:
          name: clean-url-copy.crx
          path: ../*.crx

      - name: Create release and attach CRX
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.crx
